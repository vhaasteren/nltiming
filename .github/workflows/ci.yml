name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # enterprise-pulsar depends on scikit-sparse, which builds against CHOLMOD.
      # Same approach as nanograv/enterprise CI (libsuitesparse-dev on Ubuntu).
      - name: Install SuiteSparse (for scikit-sparse / enterprise)
        run: |
          sudo apt-get update
          sudo apt-get install -y libsuitesparse-dev
      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev,discovery,enterprise,numpyro]"
      - name: Lint
        run: |
          black --check src/ tests/
          ruff check src/ tests/
      - name: Test
        run: pytest tests/ -m "not slow" -q
