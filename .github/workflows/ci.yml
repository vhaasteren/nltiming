name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # jug-timing (tempo2-dev) requires Python >= 3.12
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # enterprise-pulsar → scikit-sparse needs CHOLMOD headers (nanograv/enterprise CI).
      - name: Install SuiteSparse (for scikit-sparse / enterprise)
        run: |
          sudo apt-get update
          sudo apt-get install -y libsuitesparse-dev
      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # jug: github.com/vhaasteren/jug@tempo2-dev (see optional-dependencies)
          # discovery: github.com/nanograv/discovery
          pip install -e ".[dev,jug,discovery,enterprise,numpyro]"
      - name: Lint
        run: |
          black --check src/ tests/
          ruff check src/ tests/
      - name: Test
        run: pytest tests/ -m "not slow" -q
        env:
          # jug pulls PySide6; avoid Qt display issues on headless runners
          QT_QPA_PLATFORM: offscreen
