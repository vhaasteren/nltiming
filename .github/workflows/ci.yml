name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # jug-timing (tempo2-dev) requires Python >= 3.12
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # enterprise-pulsar → scikit-sparse needs CHOLMOD headers (nanograv/enterprise CI).
      - name: Install SuiteSparse (for scikit-sparse / enterprise)
        run: |
          sudo apt-get update
          sudo apt-get install -y libsuitesparse-dev
      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # jug: github.com/vhaasteren/jug@tempo2-dev (see optional-dependencies)
          # discovery: github.com/vhaasteren/discovery@temp/nltiming
          # enterprise from nanograv/dev (not PyPI yet; prior_draw_mode, MockPulsar)
          pip install -e ".[dev,jug,discovery,enterprise,numpyro]"
          # enterprise_extensions@dev hard-requires libstempo (needs a system tempo2
          # build). CI must not build libstempo: install e_e without that dep chain
          # so JumpProposal / setup_sampler stay importable. Pure-Python runtime deps
          # only — no libstempo/tempo2. Prefer libstempo.sandbox / MetaPulsar sandbox
          # when a real tempo2 stack is available outside this job.
          pip install --no-deps \
            "enterprise_extensions @ git+https://github.com/nanograv/enterprise_extensions.git@dev"
          pip install \
            "healpy>=1.14.0" \
            "emcee" \
            "ptmcmcsampler>=2.1.0" \
            "scikit-learn>=0.24" \
            "ephem>=3.7.6.0" \
            "matplotlib>=3.1.0" \
            "pyarrow>=16.1.0" \
            "six"
      - name: Lint
        run: |
          black --check src/ tests/
          ruff check src/ tests/
      - name: Test
        run: pytest tests/ -m "not slow" -q
        env:
          # jug pulls PySide6; avoid Qt display issues on headless runners
          QT_QPA_PLATFORM: offscreen
